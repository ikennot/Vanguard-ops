<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanguard Ops: Tactical Strike</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-root">
    <canvas id="game-canvas" width="1280" height="720" aria-label="Vanguard Ops game canvas"></canvas>

    <section id="menu-main" class="overlay">
      <div class="menu-actions">
        <button id="btn-start" aria-label="Start Mission">
          <img src="assets/menu/startmission.png" alt="Start Mission">
        </button>
        <button id="btn-settings" aria-label="Settings">
          <img src="assets/menu/settings.png" alt="Settings">
        </button>
        <button id="btn-tutorial" aria-label="Tutorial">
          <img src="assets/menu/tutorial.png" alt="Tutorial">
        </button>
        <button id="btn-exit" aria-label="Exit">
          <img src="assets/menu/exit.png" alt="Exit">
        </button>
      </div>
    </section>

    <section id="screen-rules" class="overlay hidden panel full-screen">
      <div class="rules-fullscreen-container">
        <img src="assets/rules/rules.png" alt="Game rules" class="rules-fullscreen-image">
      </div>
      <div class="menu-actions">
        <button id="btn-rules-ok" class="btn-img">
          <img src="assets/sprites/ui/buttons/ok.png" alt="OK">
        </button>
      </div>
    </section>

    <section id="screen-tutorial" class="overlay hidden panel full-screen">
      <div class="tutorial-fullscreen-container">
        <img src="assets/tutorial/tutorialbg.png" alt="Tutorial Guide" class="tutorial-fullscreen-image">
        <canvas id="tutorial-canvas" width="1280" height="720"></canvas>
      </div>
      <div class="menu-actions tutorial-actions">
        <button id="btn-tutorial-back" class="btn-img">
          <img src="assets/tutorial/returntomainmenu.png" alt="Return to Main Menu">
        </button>
      </div>
    </section>

    <section id="screen-map-select" class="overlay hidden panel full-screen">
      <img src="assets/sprites/ui/selectmapspace.png" id="map-select-bg-frame" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1;">
      <div class="map-nav-row">
        <button id="btn-map-prev" class="btn-img btn-nav" aria-label="Previous map">
          <img src="assets/sprites/ui/buttons/lessthan.png" alt="Prev">
        </button>
        <div class="map-card-container">
          <img src="assets/sprites/environment/space_selectmap.jpg" id="map-preview-img" alt="Map Preview" class="map-preview-img">
        </div>
        <button id="btn-map-next" class="btn-img btn-nav" aria-label="Next map">
          <img src="assets/sprites/ui/buttons/greaterthan.png" alt="Next">
        </button>
      </div>
      <div class="menu-actions map-select-actions">
        <button id="btn-map-confirm" class="btn-img">
          <img src="assets/space/ok.png" alt="Confirm">
        </button>
      </div>
    </section>

    <section id="screen-resources" class="overlay hidden panel full-screen">
      <div class="resources-fullscreen-container">
        <img src="assets/resources_menu/resources.png" id="resources-info-img" alt="Game Resources" class="resources-fullscreen-image">
      </div>
      <div class="menu-actions">
        <button id="btn-resources-ok" class="btn-img">
          <img src="assets/resources_menu/ok.png" alt="OK">
        </button>
      </div>
    </section>

    <section id="screen-level-info" class="overlay hidden panel full-screen">
      <!-- Background Terrain -->
      <img src="assets/space/terrainspace.jpg" id="level-info-bg" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1;">
      
      <!-- Modal Blur Overlay -->
      <img src="assets/space/modalblur.jpg" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:2; opacity: 0.5;">
      
      <!-- Main Content Container -->
      <div class="level-info-container" style="position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%;">
        <div style="position:relative; display:flex; flex-direction:column; align-items:center;">
          <!-- Level Info Panel -->
          <img src="assets/space/gameinfo_space.png" id="level-info-img" alt="Level Info" style="width:650px; height:auto;">
          
          <!-- OK Button Overlay -->
          <div class="menu-actions" style="position:absolute; bottom:50px; right: 255px; transform:none; margin:0;">
            <button id="btn-level-info-ok" class="btn-img">
              <img src="assets/space/ok.png" alt="OK" style="width:150px; height:auto;">
            </button>
          </div>
        </div>
      </div>
    </section>

    <section id="menu-pause" class="overlay hidden panel full-screen" >
      <div class="pause-card-wrapper">
        <img src="assets/space/gamepaused.png" alt="Game Paused" class="pause-card-bg">
        <div class="pause-actions">
          <div class="pause-top-btns">
            <button id="btn-resume" class="btn-img">
              <img src="assets/space/resume.png" alt="Resume">
            </button>
            <button id="btn-restart" class="btn-img">
              <img src="assets/space/restart.png" alt="Restart">
            </button>
          </div>
          <button id="btn-main" class="btn-img btn-return">
            <img src="assets/space/returntomainmenu.png" alt="Return to Main Menu">
          </button>
        </div>
      </div>
    </section>

    <section id="menu-settings" class="overlay hidden">
      <!-- Modal Blur Overlay -->
      <img src="assets/lava/modalblur.jpg" class="modal-blur-overlay" alt="">
      
      <!-- Background buttons to match Main Menu -->
      <div class="menu-actions main-menu-copy">
        <button class="btn-img"><img src="assets/menu/startmission.png" alt=""></button>
        <button class="btn-img"><img src="assets/menu/settings.png" alt=""></button>
        <button class="btn-img btn-tutorial-copy"><img src="assets/menu/tutorial.png" alt=""></button>
        <button class="btn-img"><img src="assets/menu/exit.png" alt=""></button>
      </div>

      <!-- Settings Modal on top -->
      <div class="settings-container">
        <img src="assets/system_settings/systembg.png" alt="Settings Background" class="settings-bg">
        <div class="settings-content-overlay">
          <div class="toggles-container">
            <div class="toggle-group" id="toggle-bgm">
              <img src="assets/system_settings/on.png" class="toggle-on" alt="ON">
              <img src="assets/system_settings/off.png" class="toggle-off hidden" alt="OFF">
            </div>
            <div class="toggle-group" id="toggle-sfx">
              <img src="assets/system_settings/on.png" class="toggle-on" alt="ON">
              <img src="assets/system_settings/off.png" class="toggle-off hidden" alt="OFF">
            </div>
            <div class="toggle-group" id="toggle-visuals">
              <img src="assets/system_settings/on.png" class="toggle-on" alt="ON">
              <img src="assets/system_settings/off.png" class="toggle-off hidden" alt="OFF">
            </div>
          </div>

          <div class="settings-actions">
            <button id="btn-settings-save" class="btn-img">
              <img src="assets/system_settings/save&close.png" alt="Save & Close">
            </button>
            <button id="btn-settings-back" class="btn-img">
              <img src="assets/system_settings/back.png" alt="Back">
            </button>
          </div>
        </div>
      </div>
    </section>

    <section id="screen-victory" class="overlay hidden panel full-screen victory">
      <img src="assets/win1/victory.png" alt="Mission Success" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1;">
      <div class="victory-container" style="position:relative; z-index:10; width:100%; height:100%;">
        <div id="scoreboard-victory" class="scoreboard" style="position: absolute; top: -140 px; right: 400px; color: #fff; padding: 0; border: none; font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; font-weight: bold; font-size: 2.8rem; line-height: 1.5; min-width: 250px; text-shadow: 1px 1px 2px #000; text-align: left; background: transparent;"></div>
        <div class="menu-actions row" style="position: absolute; top: 360px; right: 120px; display: flex; gap: 15px; margin: 0;">
          <button id="btn-victory-back" class="btn-img btn-return">
            <img src="assets/menu/back.png" alt="Back" style="width: 300px; height: auto;">
          </button>
          <button id="btn-victory-next" class="btn-img">
            <img src="assets/menu/nextlevel.png" alt="Next Level" style="width: 300px; height: auto;">
          </button>
        </div>
      </div>
    </section>

    <section id="screen-defeat" class="overlay hidden panel full-screen defeat">
      <img src="assets/win1/defeat.png" alt="Mission Failure" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1;">
      <div class="defeat-container" style="position:relative; z-index:10; width:100%; height:100%;">
        <div id="scoreboard-defeat" class="scoreboard" style="position: absolute; top: -140px; right: 400px; color: #fff; padding: 0; border: none; font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; font-weight: bold; font-size: 2.8rem; line-height: 1.5; min-width: 250px; text-shadow: 1px 1px 2px #000; text-align: left; background: transparent;"></div>
        <div class="menu-actions row" style="position: absolute; top: 360px; right: 120px; display: flex; gap: 15px; margin: 0;">
          <button id="btn-defeat-restart" class="btn-img">
            <img src="assets/lose/restartmission.png" alt="Restart Mission" style="width: 300px; height: auto;">
          </button>
          <button id="btn-defeat-main" class="btn-img btn-return">
            <img src="assets/lose/EXITlose.png" alt="Main Menu" style="width: 300px; height: auto;">
          </button>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
