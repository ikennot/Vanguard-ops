<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanguard Ops: Tactical Strike</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-root">
    <canvas id="game-canvas" width="1280" height="720" aria-label="Vanguard Ops game canvas"></canvas>

    <section id="menu-main" class="overlay">
      <div class="menu-actions">
        <button id="btn-start" aria-label="Start Mission">
          <img src="assets/menu/startmission.png" alt="Start Mission">
        </button>
        <button id="btn-settings" aria-label="Settings">
          <img src="assets/menu/settings.png" alt="Settings">
        </button>
        <button id="btn-tutorial" aria-label="Tutorial">
          <img src="assets/menu/tutorial.png" alt="Tutorial">
        </button>
        <button id="btn-exit" aria-label="Exit">
          <img src="assets/menu/exit.png" alt="Exit">
        </button>
      </div>
    </section>

    <section id="screen-rules" class="overlay hidden panel full-screen">
      <div class="rules-fullscreen-container">
        <img src="assets/rules/rules.png" alt="Game rules" class="rules-fullscreen-image">
      </div>
      <div class="menu-actions">
        <button id="btn-rules-ok" class="btn-img">
          <img src="assets/sprites/ui/buttons/ok.png" alt="OK">
        </button>
      </div>
    </section>

    <section id="screen-tutorial" class="overlay hidden panel full-screen">
      <div class="tutorial-fullscreen-container">
        <img src="assets/sprites/environment/tutorial_platform.png" alt="Tutorial Guide" class="tutorial-fullscreen-image">
        <canvas id="tutorial-canvas" width="1280" height="720"></canvas>
      </div>
      <div class="menu-actions">
        <button id="btn-tutorial-back" class="btn-img btn-return">
          <img src="assets/sprites/ui/buttons/returntomainmenu - Copy.png" alt="Return to Base">
        </button>
      </div>
    </section>

    <section id="screen-map-select" class="overlay hidden panel full-screen">
      <img src="assets/sprites/ui/selectmapspace.png" id="map-select-bg-frame" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1;">
      <div class="map-nav-row">
        <button id="btn-map-prev" class="btn-img btn-nav" aria-label="Previous map">
          <img src="assets/sprites/ui/buttons/lessthan.png" alt="Prev">
        </button>
        <div class="map-card-container">
          <img src="assets/sprites/environment/space_selectmap.jpg" id="map-preview-img" alt="Map Preview" class="map-preview-img">
        </div>
        <button id="btn-map-next" class="btn-img btn-nav" aria-label="Next map">
          <img src="assets/sprites/ui/buttons/greaterthan.png" alt="Next">
        </button>
      </div>
      <div class="menu-actions map-select-actions">
        <button id="btn-map-confirm" class="btn-img">
          <img src="assets/sprites/ui/buttons/ok.png" alt="Confirm">
        </button>
      </div>
    </section>

    <section id="screen-resources" class="overlay hidden panel full-screen">
      <div class="resources-fullscreen-container">
        <img src="assets/resources_menu/resources.png" id="resources-info-img" alt="Game Resources" class="resources-fullscreen-image">
      </div>
      <div class="menu-actions">
        <button id="btn-resources-back" class="btn-img btn-return">
          <img src="assets/sprites/ui/buttons/returntomainmenu - Copy.png" alt="Back">
        </button>
        <button id="btn-resources-ok" class="btn-img">
          <img src="assets/sprites/ui/buttons/ok.png" alt="Start Deployment">
        </button>
      </div>
    </section>

    <section id="screen-level-info" class="overlay hidden panel full-screen">
      <img src="assets/space/terrainspace.jpg" id="level-info-bg" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1;">
      <div class="level-info-container" style="position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%;">
        <img src="assets/space/gameinfo_space.png" id="level-info-img" alt="Level Info" style="max-width:80%; height:auto;">
        <div class="menu-actions" style="margin-top: -80px;">
          <button id="btn-level-info-ok" class="btn-img">
            <img src="assets/space/ok.png" alt="OK">
          </button>
        </div>
      </div>
    </section>

    <section id="menu-pause" class="overlay hidden panel full-screen">
      <img src="assets/space/gamepaused.png" alt="Game Paused" class="pause-fullscreen-image" style="max-width:80%; height:auto;">
      <div class="menu-actions pause-actions" style="position: absolute; bottom: 15%; display: flex; gap: 20px;">
        <button id="btn-resume" class="btn-img">
          <img src="assets/space/resume.png" alt="Resume">
        </button>
        <button id="btn-restart" class="btn-img">
          <img src="assets/space/restart.png" alt="Restart">
        </button>
        <button id="btn-main" class="btn-img btn-return">
          <img src="assets/space/returntomainmenu.png" alt="Return to Main Menu">
        </button>
      </div>
    </section>

    <section id="menu-settings" class="overlay hidden">
      <h2>System Settings</h2>
      <label>BGM <input id="bgm-volume" type="range" min="0" max="100" value="70"></label>
      <label>SFX <input id="sfx-volume" type="range" min="0" max="100" value="80"></label>
      <label>Particle Effects <input id="particle-enabled" type="checkbox" checked></label>
      <p>Controls: WASD move, Left Click shoot, Space jetpack, ESC pause</p>
      <button id="btn-settings-close">Back</button>
    </section>

    <section id="screen-victory" class="overlay hidden panel full-screen victory">
      <img src="assets/win1/win1.jpeg" alt="Mission Success" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1;">
      <div class="victory-container" style="position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%;">
        <div id="victory-kills" style="color: #ffd700; font-size: 24px; margin-top: 250px; font-family: sans-serif; font-weight: bold; text-shadow: 2px 2px 4px #000;">Target Kills: 15/15</div>
        <div id="scoreboard-victory" class="scoreboard" style="display:none;"></div>
        <div class="menu-actions row" style="margin-top: 30px; display: flex; gap: 20px;">
          <button id="btn-victory-replay" class="btn-img">
            <img src="assets/win1/playagain.png" alt="Play Again">
          </button>
          <button id="btn-victory-main" class="btn-img btn-return">
            <img src="assets/win1/mainmenu.png" alt="Main Menu">
          </button>
        </div>
      </div>
    </section>

    <section id="screen-defeat" class="overlay hidden panel full-screen defeat">
      <img src="assets/lose/lose.png" alt="Mission Failure" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1;">
      <div class="defeat-container" style="position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%;">
        <div id="defeat-lives" style="color: #ff4444; font-size: 24px; margin-top: 250px; font-family: sans-serif; font-weight: bold; text-shadow: 2px 2px 4px #000;">Lives Remaining: 0</div>
        <div id="scoreboard-defeat" class="scoreboard" style="display:none;"></div>
        <div class="menu-actions row" style="margin-top: 30px; display: flex; gap: 20px;">
          <button id="btn-defeat-restart" class="btn-img">
            <img src="assets/lose/restartmission.png" alt="Restart Mission">
          </button>
          <button id="btn-defeat-main" class="btn-img btn-return">
            <img src="assets/lose/EXITlose.png" alt="Main Menu">
          </button>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
